<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Formulaire Stocks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Formulaire pour la gestion des stocks">
  <meta name="theme-color" content="#0c81b4">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="/stocker/manifest.json">
  <link rel="icon" type="image/png" href="icons/favicon.ico"/>
  <script src="https://cdn.jsdelivr.net/npm/pouchdb@7.3.1/dist/pouchdb.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="js/pwa.js"></script>
  <script src="js/auth.js"></script>
</head>
<body>
  <header>
    <div class="header-content">
      <h1>📦 Enregistrement de Stock</h1>
      <div class="user-info">
        <span id="currentUserLabel" class="account-info">Non connecté</span>
        <button class="logout-btn" id="logoutBtn">
          Déconnexion
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main>
    <div class="field-group" style="text-align:center;">
      <label for="modeScan">🎛️ Mode de scan :</label>
      <select id="modeScan">
        <option value="bluetooth" selected>Scanner Bluetooth</option>
        <option value="camera">Caméra</option>
      </select>
    </div>

    <div id="qr-reader"></div>

    <div class="photo-section">
      <div class="photo-buttons">
        <button type="button" id="takePhotoBtn">
          <span style="font-size: 1.2em;">📸</span> Prendre une photo
        </button>
        <button type="button" id="chooseGalleryBtn">
          <span style="font-size: 1.2em;">🖼️</span> Choisir depuis la galerie
        </button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
        <input type="file" id="galleryInput" accept="image/*" multiple style="display:none;">
      </div>
      
      <p class="photo-count">Photos ajoutées : <span id="photoCount">0</span>/3</p>
      <div id="previewContainer" class="preview-container"></div>
    </div>

    <form id="stockForm">
      <section id="submitStatus" class="submit-status hidden is-pending" role="status" aria-live="polite">
        <div class="sync-status-indicator" aria-hidden="true"></div>
        <div class="sync-status-copy">
          <strong>Synchronisation distante</strong>
          <span id="submitStatusText">En attente...</span>
        </div>
      </section>

      <!-- Produit -->
      <div class="field-group">
          <label for="code_produit">📵 Code Produit (Scan QR)</label>
          <input type="text" id="code_produit" name="code_produit" list="codeProduitList" inputmode="numeric" autocomplete="off" enterkeyhint="next" required>
        
        <div class="full-width">
          <label for="designation">📝 Désignation</label>
          <input list="designationList" id="designation" name="designation" autocomplete="on" autocapitalize="words" spellcheck="true" enterkeyhint="next" required>
          <datalist id="designationList"></datalist>
          <datalist id="codeProduitList"></datalist>
        </div>
      </div>

      <!-- Quantité -->
      <div class="field-group">
        <div>
          <label for="quantité_consommee">📉 Quantité</label>
          <input type="number" id="quantité_consommee" name="quantité_consommee" min="1" inputmode="numeric" enterkeyhint="next" required>
        </div>

        <div>
          <label for="unites">🧮 Unité(s)</label>
          <input type="text" id="unites" name="unites" autocomplete="on" autocapitalize="none" spellcheck="false" enterkeyhint="next" required>
        </div>
      </div>

      <!-- Stocks -->
      <div class="field-group">
        <div>
          <label for="stock_actuel">📦 Stock actuel</label>
          <input type="number" id="stock_actuel" name="stock_actuel" min="0" inputmode="numeric" enterkeyhint="next" required>
        </div>

        <div>
          <label for="stock_min">⬇️ Stock minimum</label>
          <input type="number" id="stock_min" name="stock_min" min="0" inputmode="numeric" enterkeyhint="next" required>
        </div>

        <div>
          <label for="stock_max">⬆️ Stock maximum</label>
          <input type="number" id="stock_max" name="stock_max" min="0" inputmode="numeric" enterkeyhint="next" required>
        </div>
      </div>

      <div id="stockAlert" class="stock-alert hidden" role="status" aria-live="polite"></div>

      <!-- Commande -->
      <div class="field-group">
        <div>
          <label for="a_commander">🛒 À Commander</label>
          <select id="a_commander" name="a_commander" required>
            <option value="">-- Sélectionnez --</option>
            <option value="Oui">Oui</option>
            <option value="Non" selected>Non</option>
          </select>
        </div>

        <div>
          <label for="magasin">🏪 Magasin</label>
          <select id="magasin" name="magasin" required>
            <option value="">-- Sélectionnez --</option>
            <option value="ER-MP">ER-MP</option>
            <option value="ER-MG">ER-MG</option>
          </select>
        </div>
      </div>

      <!-- Dates et remarques -->
      <div class="field-group">
        <div>
          <label for="date_sortie">📅 Date de sortie</label>
          <input type="datetime-local" id="date_sortie" name="date_sortie" required>
        </div>
        
        <div class="full-width">
          <label for="remarques">📌 Remarques</label>
          <textarea id="remarques" name="remarques" rows="3" placeholder="Remarques optionnelles..." autocapitalize="sentences" spellcheck="true" enterkeyhint="done"></textarea>
        </div>
      </div>

      <!-- Axes -->
      <div class="field-group">
        <div class="full-width">
          <label for="axe1">🏷️ Axe 1 (Compte)</label>
          <input type="text" id="axe1" name="axe1" readonly>
        </div>

        <div>
          <label for="axe2">📊 Axe 2</label>
          <input type="text" id="axe2" name="axe2" value="SUP=SEMPQRLER" autocomplete="off" autocapitalize="characters" spellcheck="false" enterkeyhint="done" required>
        </div>
      </div>

      <!-- Boutons -->
      <div class="button-group">
        <button type="submit" id="submitBtn">💾 Enregistrer</button>
        <button type="button" id="resetBtn">🔄 Réinitialiser</button>
      </div>
    </form>

    <!-- Seulement visible pour l'admin -->
    <!--<a href="admin.html" class="admin-link" id="adminLink" style="display:none;">📈 Voir les résultats 📉</a>-->
    <a href="admin.html?fromIndex=true" class="admin-link" id="adminLink" style="display:none;">
  📊 Voir mes enregistrements
</a>
  </main>

  <footer>
    <p>&copy; 📦 2025 - Gestion de Stocks</p>
  </footer>

  <script src="js/voice-input.js"></script>
  <script src="js/gmail.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
